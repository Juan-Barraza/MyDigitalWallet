<div class="tx-container">
  <div class="tx-header">
  </div>

  @if (loading) {
    @for (item of [1,2,3,4]; track $index) {
      <div class="tx-skeleton"></div>
    }
  } @else {
    @for (tx of transactions; track tx.id) {
      <div class="tx-item ion-activatable" [class.has-emoji]="tx.emoji">
        <ion-ripple-effect></ion-ripple-effect>

        <div class="tx-icon">
          @if (tx.emoji) {
            <span>{{ tx.emoji }}</span>
          } @else {
            <ion-icon name="bag-handle-outline"></ion-icon>
          }
        </div>

        <div class="tx-info">
          <p class="tx-merchant">{{ tx.merchant }}</p>
          <p class="tx-date">{{ formatDate(tx.date) }}</p>
        </div>

        <div class="tx-right">
          <span class="tx-amount">${{ tx.amount | number:'1.2-2' }}</span>
          <span class="tx-chip">···· {{ tx.cardLastFour }}</span>
        </div>
      </div>
    } @empty {
      <div class="tx-empty">
        <ion-icon name="receipt-outline"></ion-icon>
        <p>No transactions yet</p>
      </div>
    }
  }
</div>
